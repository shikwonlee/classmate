<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6D5DF6"/>
      <stop offset="50%" stop-color="#5B4FE8"/>
      <stop offset="100%" stop-color="#3F35C8"/>
    </linearGradient>

    <linearGradient id="capTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#DDE3FF"/>
    </linearGradient>

    <linearGradient id="capBand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A2560"/>
      <stop offset="100%" stop-color="#1A1740"/>
    </linearGradient>

    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFC94D"/>
      <stop offset="100%" stop-color="#FF9A3D"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#8B7DFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8B7DFF" stop-opacity="0"/>
    </radialGradient>

    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#140F45" flood-opacity="0.35"/>
    </filter>

    <filter id="tinyShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- App icon background: rounded square (Material 3 style) -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Graduation cap group, angled slightly for realism/depth -->
  <g filter="url(#softShadow)" transform="translate(256 226)">

    <!-- Cap band / underside (gives 3D depth) -->
    <path d="M -108 -6 L 0 44 L 108 -6 L 108 40 C 108 62 60 82 0 82 C -60 82 -108 62 -108 40 Z"
          fill="url(#capBand)"/>

    <!-- Cap top (diamond, viewed at an angle for realism) -->
    <polygon points="0,-92 158,-6 0,80 -158,-6" fill="url(#capTop)"/>
    <polygon points="0,-92 158,-6 0,-6" fill="#F4F6FF" opacity="0.55"/>

    <!-- Subtle top ridge line -->
    <polygon points="0,-92 158,-6 0,80 -158,-6" fill="none" stroke="#C7CEF5" stroke-width="2" opacity="0.6"/>

    <!-- Tassel button -->
    <circle cx="0" cy="-6" r="10" fill="#2A2560"/>

    <!-- Tassel cord -->
    <path d="M 0 -6 C 40 10, 46 40, 44 66" fill="none" stroke="#FFC94D" stroke-width="7" stroke-linecap="round"/>
    <!-- Tassel strands -->
    <g transform="translate(44 66)" filter="url(#tinyShadow)">
      <rect x="-6" y="0" width="12" height="34" rx="6" fill="url(#badgeGrad)"/>
      <ellipse cx="0" cy="36" rx="9" ry="7" fill="#FF9A3D"/>
    </g>
  </g>

  <!-- Chat/message bubble badge, tucked at lower-right, signals collaboration -->
  <g transform="translate(352 356)" filter="url(#tinyShadow)">
    <circle r="54" fill="url(#badgeGrad)"/>
    <circle r="54" fill="none" stroke="#FFFFFF" stroke-width="5" opacity="0.9"/>
    <path d="M -22 6 C -22 -14 -8 -26 10 -26 C 28 -26 42 -14 42 6 C 42 26 28 38 10 38 C 4 38 -1 37 -6 35 L -24 42 L -19 26 C -21 20 -22 13 -22 6 Z"
          fill="#FFFFFF"/>
    <circle cx="0" cy="6" r="4.2" fill="#FF9A3D"/>
    <circle cx="12" cy="6" r="4.2" fill="#FF9A3D"/>
    <circle cx="24" cy="6" r="4.2" fill="#FF9A3D"/>
  </g>
</svg>
